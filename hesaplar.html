<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hesaplar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { max-width: 100%; overflow-x: hidden; }

  :root {
    --canvas: #F9FAFB;
    --surface: #FFFFFF;
    --ink: #18181B;
    --steel: #71717A;
    --muted: #94A3B8;
    --border: rgba(226,232,240,0.6);
    --shadow: rgba(0,0,0,0.05);
    --blue: #3B82F6;
    --blue-bg: rgba(59,130,246,0.07);
    --blue-soft: rgba(59,130,246,0.12);
    --row-hover: rgba(59,130,246,0.025);
    --radius: 1.25rem;
    --ease-spring: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  }

  body {
    font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--canvas);
    color: var(--ink);
    min-height: 100vh;
    padding: 3rem 1.5rem;
  }

  .page-header {
    max-width: 960px;
    margin: 0 auto 2.5rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
  }

  .page-title {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.1;
    color: var(--ink);
  }

  .page-subtitle {
    font-size: 0.875rem;
    color: var(--steel);
    margin-top: 0.375rem;
    font-weight: 400;
  }

  .count-badge {
    background: var(--blue-bg);
    color: var(--blue);
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.3rem 0.75rem;
    border-radius: 2rem;
    letter-spacing: 0.01em;
    border: 1px solid var(--blue-soft);
    white-space: nowrap;
  }

  .card {
    max-width: 960px;
    margin: 0 auto;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow:
      0 1px 2px var(--shadow),
      0 40px 80px -20px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }

  thead tr { border-bottom: 1px solid var(--border); }

  th {
    padding: 0.875rem 1.25rem;
    text-align: left;
    font-size: 0.6875rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    background: var(--canvas);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 200ms var(--ease-out);
    opacity: 0;
    transform: translateY(10px);
    animation: row-in 400ms var(--ease-spring) forwards;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--row-hover); }

  @keyframes row-in {
    to { opacity: 1; transform: translateY(0); }
  }

  tbody tr:nth-child(1)  { animation-delay: 60ms;  }
  tbody tr:nth-child(2)  { animation-delay: 110ms; }
  tbody tr:nth-child(3)  { animation-delay: 160ms; }
  tbody tr:nth-child(4)  { animation-delay: 210ms; }
  tbody tr:nth-child(5)  { animation-delay: 260ms; }
  tbody tr:nth-child(6)  { animation-delay: 310ms; }
  tbody tr:nth-child(7)  { animation-delay: 360ms; }
  tbody tr:nth-child(8)  { animation-delay: 410ms; }
  tbody tr:nth-child(9)  { animation-delay: 460ms; }
  tbody tr:nth-child(10) { animation-delay: 510ms; }

  td {
    padding: 0.875rem 1.25rem;
    font-size: 0.875rem;
    vertical-align: middle;
  }

  .app-name {
    font-weight: 600;
    font-size: 0.9375rem;
    color: var(--ink);
    display: block;
    line-height: 1.3;
  }

  .app-link {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    font-size: 0.75rem;
    color: var(--blue);
    text-decoration: none;
    margin-top: 0.2rem;
    opacity: 0.7;
    transition: opacity 150ms;
  }
  .app-link:hover { opacity: 1; }
  .app-link svg { width: 10px; height: 10px; flex-shrink: 0; }

  .type-badge {
    display: inline-block;
    background: var(--canvas);
    border: 1px solid var(--border);
    color: var(--steel);
    font-size: 0.75rem;
    font-weight: 500;
    padding: 0.25rem 0.625rem;
    border-radius: 2rem;
    white-space: nowrap;
  }

  .cred-cell {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    min-width: 0;
  }

  .cred-text {
    font-family: 'Courier New', 'Lucida Console', monospace;
    font-size: 0.8125rem;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 220px;
    flex: 1;
  }



  .btn-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 0.375rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--steel);
    cursor: pointer;
    flex-shrink: 0;
    transition:
      background 150ms,
      border-color 150ms,
      color 150ms,
      opacity 150ms,
      transform 120ms var(--ease-spring);
    opacity: 0;
  }

  tr:hover .btn-icon { opacity: 1; }

  .btn-icon:hover {
    background: var(--blue-bg);
    border-color: var(--blue-soft);
    color: var(--blue);
    transform: scale(1.08);
  }

  .btn-icon:active { transform: scale(0.95); }
  .btn-icon svg { width: 14px; height: 14px; pointer-events: none; }

  .btn-icon.success {
    background: rgba(34,197,94,0.08);
    border-color: rgba(34,197,94,0.25);
    color: #16a34a;
    opacity: 1;
  }

  #toast {
    position: fixed;
    bottom: 1.75rem;
    left: 50%;
    transform: translateX(-50%) translateY(calc(100% + 2rem));
    background: var(--ink);
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 0.8125rem;
    font-weight: 500;
    padding: 0.625rem 1.25rem;
    border-radius: 2rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    z-index: 9999;
    transition: transform 300ms var(--ease-spring), opacity 300ms;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
  }

  #toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  @media (max-width: 767px) {
    body { padding: 1rem 0.75rem 3rem; }
    .page-header { margin-bottom: 1.25rem; flex-wrap: wrap; align-items: flex-start; }
    .page-title { font-size: 1.125rem; }
    .card { border-radius: 0.875rem; }
    table { table-layout: fixed; width: 100%; }
    th:nth-child(1), td:nth-child(1) { width: 34%; }
    th:nth-child(3), td:nth-child(3) { width: 34%; }
    th:nth-child(4), td:nth-child(4) { width: 32%; }
    th, td { padding: 0.625rem 0.625rem; }
    .app-name { font-size: 0.8125rem; }
    .app-link { font-size: 0.6875rem; }
    .cred-text { font-size: 0.6875rem; max-width: none; }
    .pwd-real { font-size: 0.6875rem; }
    .btn-icon { opacity: 1; width: 28px; height: 28px; }
    th.col-type, td.col-type { display: none; }
    .cred-cell { gap: 0.25rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    tbody tr { animation: none; opacity: 1; transform: none; }
    .btn-icon, #toast { transition: none; }
  }
</style>
</head>
<body>

<header class="page-header">
  <div>
    <h1 class="page-title">Hesaplar</h1>
    <p class="page-subtitle">Akademi araçları giriş bilgileri</p>
  </div>
  <span class="count-badge">10 uygulama</span>
</header>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>Uygulama</th>
        <th class="col-type">Kullanım Amacı</th>
        <th>Kullanıcı Adı</th>
        <th>Sifre</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div id="toast"></div>

<script>
const apps = [
  { name: 'Clipdrop',   url: 'https://clipdrop.co',         type: 'Gorsel Duzenleme',       user: 'akademiclipdrop@gmail.com',       pass: 'Akademi2026'  },
  { name: 'Kahoot',     url: 'https://kahoot.com',          type: 'Katilimci Etkilesim',    user: 'akademi_lst',                     pass: 'Egitim123.'   },
  { name: 'Mentimeter', url: 'https://www.mentimeter.com',  type: 'Katilimci Etkilesim',    user: 'engin.sayin@turkcell.com.tr',     pass: 'Akademi123.'  },
  { name: 'Canva',      url: 'https://www.canva.com',       type: 'Tasarim',                user: 'engin.sayin@turkcell.com.tr',     pass: 'Akademi123.'  },
  { name: 'Padlet',     url: 'https://padlet.com',          type: 'Katilimci Etkilesim',    user: 'engin.sayin@turkcell.com.tr',     pass: 'Akademi123.'  },
  { name: 'Typeform',   url: 'https://www.typeform.com',    type: 'Anket Uygulamasi',       user: 'engin.sayin@turkcell.com.tr',     pass: 'Akademi1234!' },
  { name: 'Mindmap Manager',    url: 'https://www.edrawmind.com/app/create?_gl=1*d3dcb4*_ga*MzMyOTUxNDAzLjE3NTIxMzE3NjM.*_ga_24WTSJBD5B*czE3NTIxMzE3NjMkbzEkZzAkdDE3NTIxMzE3NzYkajYwJGwwJGgxMjk2NTkwODgx*_gcl_au*MTg3NTAzMDU1NS4xNzUyMTMxNzU3', type: 'Zihin Haritalama',       user: 'engin.sayin@turkcell.com.tr',     pass: 'Egitim123.'   },
  { name: 'Kling AI',   url: 'https://klingai.com',         type: 'Text / Resimden Video',  user: 'akademiclipdrop@gmail.com',       pass: 'Akademi2026'  },
  { name: 'Midjourney', url: 'https://www.midjourney.com',  type: 'Gorsel Uretme',          user: 'akademiclipdrop@gmail.com',       pass: 'Akademi2026'  },
  { name: 'ElevenLabs', url: 'https://elevenlabs.io',       type: 'YZ Ses Araci',           user: 'suheda.yildirim@turkcell.com.tr', pass: 'Akademi123.'  },
];

const typeLabels = {
  'Gorsel Duzenleme':    'Görsel Düzenleme',
  'Katilimci Etkilesim': 'Katılımcı Etkileşim',
  'Tasarim':             'Tasarım',
  'Anket Uygulamasi':    'Anket Uygulaması',
  'Zihin Haritalama':    'Zihin Haritalama',
  'Text / Resimden Video':'Text / Resimden Video',
  'Gorsel Uretme':       'Görsel Üretme',
  'YZ Ses Araci':        'YZ Ses Aracı',
};

const iconCopy  = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="8" height="10" rx="1.5"/><path d="M4 11.5H3a1.5 1.5 0 0 1-1.5-1.5V3A1.5 1.5 0 0 1 3 1.5h7A1.5 1.5 0 0 1 11.5 3v1"/></svg>`;
const iconCheck = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="2.5,8.5 6.5,12.5 13.5,4.5"/></svg>`;

const iconLink  = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 1h4v4M11 1 5 7M4.5 2.5H2A1 1 0 0 0 1 3.5v6.5A1 1 0 0 0 2 11h6.5a1 1 0 0 0 1-1V7.5"/></svg>`;

function esc(str) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(String(str)));
  return d.innerHTML;
}

const tbody = document.getElementById('tbody');

apps.forEach((app, i) => {
  const hostname = new URL(app.url).hostname.replace(/^www\./, '');
  const label = typeLabels[app.type] || app.type;
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>
      <span class="app-name">${esc(app.name)}</span>
      <a class="app-link" href="${esc(app.url)}" target="_blank" rel="noopener noreferrer">${iconLink} ${esc(hostname)}</a>
    </td>
    <td class="col-type"><span class="type-badge">${esc(label)}</span></td>
    <td>
      <div class="cred-cell">
        <span class="cred-text" title="${esc(app.user)}">${esc(app.user)}</span>
        <button class="btn-icon" data-copy="${esc(app.user)}" title="Kullanici adini kopyala" aria-label="Kullanici adini kopyala">${iconCopy}</button>
      </div>
    </td>
    <td>
      <div class="cred-cell">
        <span class="cred-text" title="${esc(app.pass)}">${esc(app.pass)}</span>
        <button class="btn-icon" data-copy="${esc(app.pass)}" title="Sifreyi kopyala" aria-label="Sifreyi kopyala">${iconCopy}</button>
      </div>
    </td>
  `;
  tbody.appendChild(tr);
});

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

function copyToClipboard(text, btn) {
  const doSuccess = () => {
    const prev = btn.innerHTML;
    btn.innerHTML = iconCheck;
    btn.classList.add('success');
    showToast('Kopyalandi');
    setTimeout(() => { btn.innerHTML = iconCopy; btn.classList.remove('success'); }, 1500);
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(doSuccess).catch(() => fallbackCopy(text, doSuccess));
  } else {
    fallbackCopy(text, doSuccess);
  }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) {}
  document.body.removeChild(ta);
}

document.addEventListener('click', e => {
  const copyBtn = e.target.closest('[data-copy]');
  if (copyBtn) { copyToClipboard(copyBtn.dataset.copy, copyBtn); return; }

});
</script>
</body>
</html>
